# git-cliff configuration -- https://git-cliff.org/docs/configuration
# Sinh CHANGELOG.md tu Conventional Commits. Khong dung toi version
# (version do GitVersion lo), chi gom commit theo tag dang [vV]?X.Y.Z.

[changelog]
# Header dat dau file changelog.
header = """
# Changelog

All notable changes to this project are documented here.
This file is generated by [git-cliff](https://git-cliff.org) from Conventional Commits.

Each section is a **minor line** (tag `M.m.0` opens the `M.m.x` line; commits after it are
that line's versions `M.m.<commits-since-tag>`). Within a line, commits are a **timeline**:
newest on top, oldest at the bottom, each prefixed with its conventional type. `— current`
marks the line still in progress.\n
"""
# Than changelog: moi tag la 1 moc, duoi do liet ke commit phang theo timeline. Cu phap Tera.
body = """
{% if previous.version %}\
{% set v = previous.version | trim_start_matches(pat="v") | split(pat=".") %}\
## [{{ v.0 }}.{{ v.1 }}.x]{% if not version %} — current{% endif %}
{% else %}\
## [Unreleased]
{% endif %}
{% for commit in commits %}\
- *({{ commit.group }})* {% if commit.scope %}**({{ commit.scope }})** {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} [**breaking**]{% endif %}
{% endfor %}\n
"""
# Footer cuoi file.
footer = """
<!-- generated by git-cliff -->
"""
# Bo khoang trang thua o dau/cuoi.
trim = true

[git]
# Phan tich commit theo chuan Conventional Commits.
conventional_commits = true
# Bo qua commit khong theo chuan (vd merge, commit raw).
filter_unconventional = true
# Khong tach commit body thanh nhieu dong.
split_commits = false
# Lam sach message truoc khi parse.
commit_preprocessors = [
    # Go bo khoang trang dau dong.
    { pattern = '  +', replace = " " },
]
# Gan moi commit mot 'type' ngan (hien thi inline dang (feat), (docs)...). Khong group_by nen
# thu tu giu nguyen theo timeline; nhan 'group' chi dung lam prefix loai.
commit_parsers = [
    { message = "^feat", group = "feat" },
    { message = "^fix", group = "fix" },
    { message = "^perf", group = "perf" },
    { message = "^refactor", group = "refactor" },
    { message = "^docs", group = "docs" },
    { message = "^test", group = "test" },
    { message = "^build", group = "build" },
    { message = "^ci", group = "ci" },
    { message = "^style", group = "style" },
    { message = "^revert", group = "revert" },
    { message = "^sample", group = "sample" },
    # Bo qua commit chore(release) (neu sau nay co tool bump version).
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore", group = "chore" },
    # Con lai.
    { message = ".*", group = "other" },
]
# Bo commit merge.
filter_commits = false
# Chi lay tag dang [vV]?X.Y.Z (khop tag-prefix '[vV]?' cua GitVersion).
tag_pattern = '[vV]?[0-9]+\.[0-9]+\.[0-9]+'
# Timeline: commit moi nhat len tren cung trong moi dong.
sort_commits = "newest"
